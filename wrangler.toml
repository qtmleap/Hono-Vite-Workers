name = "hono_vite_workers"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat_v2"]

[env.staging]
name = "hono_vite_workers_dev"
workers_dev = true

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[env.staging.assets]
directory = "dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[assets]
directory = "dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[observability]
enabled = true
head_sampling_rate = 1

[env.production]
name = "hono_vite_workers"
workers_dev = false

[env.production.observability]
enabled = true
head_sampling_rate = 1

[env.production.assets]
directory = "dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[dev]
port = 8787
ip = "0.0.0.0"
local_protocol = "http"
